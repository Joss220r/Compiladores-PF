services:
  - type: web
    name: sql-platform-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: CATALOG_SOURCE
        value: memory
      - key: CORS_ALLOWED_ORIGINS
        value: https://sql-platform-frontend.onrender.com
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: require

  - type: web
    name: sql-platform-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sql-platform-backend.onrender.com
