services:
  - type: web
    name: sql-platform-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: CATALOG_SOURCE
        value: postgres
      - key: CORS_ALLOWED_ORIGINS
        value: https://sql-platform-frontend.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false

  - type: web
    name: sql-platform-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sql-platform-backend.onrender.com
