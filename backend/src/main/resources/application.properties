spring.application.name=sql-platform-backend
server.port=${PORT:8080}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.catalog.source=${CATALOG_SOURCE:memory}
app.catalog.jdbc-url=${DATABASE_URL:}
app.catalog.username=${DATABASE_USERNAME:}
app.catalog.password=${DATABASE_PASSWORD:}

app.history.db-host=${DB_HOST:}
app.history.db-port=${DB_PORT:5432}
app.history.db-name=${DB_NAME:}
app.history.db-user=${DB_USER:}
app.history.db-password=${DB_PASSWORD:}
app.history.db-ssl=${DB_SSL:require}
